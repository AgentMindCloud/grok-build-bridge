name: hierarchical-hello
goal: "Compose a friendly multilingual hello via two-team hierarchical orchestration."

orchestra:
  mode: simulated
  debate_rounds: 1
  debate_style: prompt-simulated
  include_verbose_streaming: true
  orchestration:
    pattern: hierarchical
    config: {}
  agents:
    - {name: Harper, role: researcher}
    - {name: Benjamin, role: logician}
    - {name: Lucas, role: contrarian}
    - {name: Grok, role: coordinator}

safety:
  lucas_veto_enabled: true
  confidence_threshold: 0.75
  max_veto_retries: 0

deploy:
  target: stdout
  post_to_x: false
