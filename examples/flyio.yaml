# Example: deploy a Bridge-built agent to Fly.io.
#
#   $ grok-build-bridge run examples/flyio.yaml --dry-run   # phases 1–3 only
#   $ grok-build-bridge run examples/flyio.yaml             # writes fly.toml
#                                                           # then `flyctl deploy`
#                                                           # if the CLI is on PATH
#
# Prerequisites for a real deploy:
#   macOS:  brew install flyctl
#   linux:  curl -L https://fly.io/install.sh | sh
#   $ flyctl auth login
#   $ flyctl apps create flyio-demo-bot   # one-time, name must match `name:` below
#
# Bridge always writes a `fly.toml` next to the generated `main.py`. If
# `flyctl` is missing, Bridge prints the manual steps and exits with a
# `flyio://pending/<name>` placeholder URL — safe for CI dry-runs.

version: "1.0"
name: flyio-demo-bot
description: Minimal Grok agent deployed to a Fly.io Machine in iad. Listens on port 8080 for Fly's healthcheck.

build:
  source: grok
  language: python
  entrypoint: main.py
  grok_prompt: |
    Generate a single Python 3.11 file `main.py` that:
      - binds an aiohttp HEAD/GET listener on 0.0.0.0:8080 returning 200
        with body "ok" (so Fly's healthcheck passes);
      - logs "hello from fly" to stdout once per minute.
    Hard constraints: no shell=True, no eval/exec, no pickle, httpx with
    timeout=15.0 for any outbound calls, sys.exit(2) if XAI_API_KEY is
    missing.

deploy:
  target: flyio
  runtime: grok-install
  post_to_x: false
  safety_scan: true

agent:
  model: grok-4.20-0309
  reasoning_effort: low
  personality: terse, no editorialising

safety:
  audit_before_post: false
  max_tokens_per_run: 4000
  lucas_veto_enabled: false
