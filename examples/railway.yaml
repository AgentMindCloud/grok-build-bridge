# Example: deploy a Bridge-built agent to Railway.
#
#   $ grok-build-bridge run examples/railway.yaml --dry-run   # phases 1–3 only
#   $ grok-build-bridge run examples/railway.yaml             # writes railway.json
#                                                             # then `railway up`
#                                                             # if the CLI is on PATH
#
# Prerequisites for a real deploy:
#   $ npm i -g @railway/cli
#   $ railway login
#   $ railway init     # OR `railway link <project>`
#
# Bridge always writes a `railway.json` next to the generated `main.py`. If
# the `railway` CLI is missing, Bridge prints the manual steps and exits with
# a `railway://pending/<name>` placeholder URL — safe for CI dry-runs.

version: "1.0"
name: railway-demo-bot
description: Minimal Grok agent deployed to Railway. Logs Hello to stdout every 60 seconds.

build:
  source: grok
  language: python
  entrypoint: main.py
  grok_prompt: |
    Generate a single Python 3.11 file `main.py` that prints
    "hello from railway" to stdout every 60 seconds in an infinite loop.
    Hard constraints: no shell=True, no eval/exec, sys.exit(2) if env vars
    XAI_API_KEY or RAILWAY_PROJECT_ID are missing.

deploy:
  target: railway
  runtime: grok-install
  post_to_x: false
  safety_scan: true

agent:
  model: grok-4.20-0309
  reasoning_effort: low
  personality: terse, no editorialising

safety:
  audit_before_post: false
  max_tokens_per_run: 4000
  lucas_veto_enabled: false
