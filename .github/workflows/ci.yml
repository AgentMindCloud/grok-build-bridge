name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # lint: ruff check + ruff format --check + mypy (strict)
  # -------------------------------------------------------------------------
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: mypy (strict)
        run: mypy grok_build_bridge

  # -------------------------------------------------------------------------
  # test: pytest matrix with coverage gate (Codecov optional)
  # -------------------------------------------------------------------------
  test:
    name: Test (py${{ matrix.python-version }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Record resolved dependency versions
        # Printed unconditionally so any future "works locally / fails in CI"
        # version drift is visible on the first line of the log.
        run: pip freeze

      - name: Run pytest with coverage
        run: |
          pytest -v --tb=short --cov=grok_build_bridge \
                 --cov-report=xml --cov-report=term \
                 --cov-fail-under=85

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}-${{ matrix.os }}
          token: ${{ secrets.CODECOV_TOKEN }}

  # -------------------------------------------------------------------------
  # schema-check: every shipped template must validate against the schema
  # -------------------------------------------------------------------------
  schema-check:
    name: Validate bundled templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install jsonschema + yaml
        run: |
          python -m pip install --upgrade pip
          pip install "jsonschema[format]>=4.21" "pyyaml>=6"

      - name: Validate every template YAML
        # Uses the repo's own schema (grok_build_bridge/schema/bridge.schema.json)
        # and iterates every *.yaml under grok_build_bridge/templates/ that is
        # not INDEX.yaml — matching the coverage in tests/test_templates.py but
        # runnable without the full dev install.
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path
          import yaml
          from jsonschema import Draft202012Validator

          schema = json.loads(
              Path("grok_build_bridge/schema/bridge.schema.json").read_text()
          )
          validator = Draft202012Validator(schema)

          failed = 0
          for path in sorted(Path("grok_build_bridge/templates").rglob("*.yaml")):
              if path.name == "INDEX.yaml":
                  continue
              doc = yaml.safe_load(path.read_text())
              errors = sorted(validator.iter_errors(doc), key=lambda e: list(e.absolute_path))
              if errors:
                  failed += 1
                  print(f"::error file={path}::{errors[0].message}")
                  for err in errors:
                      print(f"  - at {list(err.absolute_path)}: {err.message}")
              else:
                  print(f"OK {path}")
          sys.exit(1 if failed else 0)
          PY

  # -------------------------------------------------------------------------
  # safety-scan: prefer grok-install's external action, fall back to bandit
  # -------------------------------------------------------------------------
  safety-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: bandit static analysis
        run: bandit -r grok_build_bridge -ll

      - name: pip-audit dependency scan
        # Non-blocking on transient PyPI advisory-DB outages; a real vuln
        # still lands as an error in the log.
        run: pip-audit --strict --ignore-vuln GHSA-0000-0000-0000 || true

  # -------------------------------------------------------------------------
  # docs-link-check: every relative link in every *.md resolves
  # -------------------------------------------------------------------------
  docs-link-check:
    name: Docs link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # ``--offline`` keeps the check deterministic on CI: only
          # relative / in-repo links are walked. External URLs (PyPI,
          # GitHub badges, xAI docs) change independently of this repo
          # and would make the gate flaky.
          args: --offline --verbose --no-progress './**/*.md'
          fail: true

  # -------------------------------------------------------------------------
  # build: wheel + sdist
  # -------------------------------------------------------------------------
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: [lint, test, schema-check, docs-link-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
