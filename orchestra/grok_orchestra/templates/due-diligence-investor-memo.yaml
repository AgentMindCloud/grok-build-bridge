# -----------------------------------------------------------------------------
# Template: due-diligence-investor-memo
#
# Purpose
#   1-pager investor memo. Harper gathers public-market evidence,
#   Grok drafts the memo, Benjamin red-teams the financial logic,
#   Lucas vetoes hype, missing risks, or unattributed claims.
#
# Required env
#   XAI_API_KEY                    required.
#
# Estimated cost
#   ≈ 16–24 k tokens per run.
#
# Expected output
#   A single page (≈ 500 words) with sections:
#     - Thesis (1 sentence)
#     - Why now (≤ 3 bullets)
#     - Risks (≥ 3 bullets — Lucas blocks if fewer than 3)
#     - Asks
#   Every numeric claim is sourced. Hype words ("revolutionary",
#   "10x", "disrupt") trigger Lucas to rewrite to neutral predicates.
#
# Example invocation
#   grok-orchestra templates copy due-diligence-investor-memo ./memo.yaml
#   $EDITOR ./memo.yaml                # set `goal` with the company name
#   grok-orchestra dry-run ./memo.yaml
#   grok-orchestra run ./memo.yaml
# -----------------------------------------------------------------------------

name: due-diligence-investor-memo
description: 1-pager investor memo — public sources only, hype-vetoed, ≥ 3 risks enforced.
version: 1.0.0
author: AgentMindCloud
tags: [business, research, debate]

inputs:
  company:
    type: string
    description: Target company name + canonical URL.
    required: true
  stage:
    type: string
    description: Funding stage you'd be considering (Seed, A, B, …).
    required: false

expected_outputs: |
  A 1-page memo (≈ 500 words): thesis, why-now, ≥ 3 risks, asks.
  Every numeric claim sourced; hype words are flagged and rewritten.

goal: |
  Target company: <REPLACE WITH NAME + URL>
  Stage: <REPLACE WITH SEED | A | B | … | LATER>

  Phase 1 — Harper (researcher):
    Surface public-market signals: traction (users / revenue if
    disclosed), team, funding history, competitive position, and any
    regulatory or geopolitical exposure. Cite each fact.

  Phase 2 — Grok (coordinator):
    Draft a 1-page memo with sections:
      - Thesis (1 sentence)
      - Why now (≤ 3 bullets)
      - Risks (≥ 3 bullets)
      - Asks (what would change your mind / what dataroom items you
        need next).
    ≤ 500 words total.

  Phase 3 — Benjamin (logician):
    Audit the financial logic. Flag any number that depends on a
    single source, any growth claim that doesn't survive a basic
    base-rate check.

  Phase 4 — Lucas (contrarian):
    Veto hype words ("revolutionary", "10x", "disrupt", "category-
    defining"). Veto if Risks has < 3 bullets. Veto if the memo
    omits a known regulatory or geopolitical exposure.

orchestra:
  mode: simulated
  debate_rounds: 1
  include_verbose_streaming: true
  orchestration:
    pattern: hierarchical
    config:
      max_depth: 2
      coordinator: Grok
  agents:
    - {name: Grok,     role: coordinator}
    - {name: Harper,   role: researcher}
    - {name: Benjamin, role: logician}
    - {name: Lucas,    role: contrarian}
  tool_routing:
    Grok:     []
    Harper:   [web_search, x_search]
    Benjamin: [code_execution]
    Lucas:    []

safety:
  lucas_veto_enabled: true
  confidence_threshold: 0.90
  max_veto_retries: 1

deploy:
  target: stdout
  post_to_x: false
