# -----------------------------------------------------------------------------
# Template: deep-research-hierarchical
#
# Purpose
#   Recursive sub-question generation with a Lucas veto on every level.
#   Grok decomposes the seed question into 3 levels of progressively
#   narrower sub-questions, Harper researches each leaf, Benjamin checks
#   logic, Lucas vetoes every intermediate synthesis. Final report only
#   ships if every level passed safety review.
#
# Required env
#   XAI_API_KEY                    required.
#
# Estimated cost
#   ≈ 30–55 k tokens per run. Hierarchical recursion 3-deep + 3 vetoes.
#
# Expected output
#   A multi-section research report (~1200 words) with citations,
#   logical-structure annotations, and Lucas's per-level approval log
#   appended at the bottom.
#
# Example invocation
#   grok-orchestra templates copy deep-research-hierarchical ./my-research.yaml
#   $EDITOR ./my-research.yaml         # change `goal` to your seed question
#   grok-orchestra dry-run ./my-research.yaml
#   grok-orchestra run ./my-research.yaml
# -----------------------------------------------------------------------------

name: deep-research-hierarchical
description: Recursive sub-question research, 3 levels deep, with a Lucas veto on each level.
version: 1.0.0
author: AgentMindCloud
tags: [research, deep, debate, web-search]

inputs:
  seed_question:
    type: string
    description: The top-level research question to decompose.
    required: true

expected_outputs: |
  A long-form research report with a Level 1 summary, Level 2 sub-question
  syntheses, Level 3 leaf evidence, citations, and Lucas's per-level
  approval log appended.

goal: |
  Seed question: <REPLACE WITH YOUR SEED QUESTION>

  Phase 1 — Level 1 decomposition (Grok):
    Break the seed into 3 sub-questions. State why each matters.

  Phase 2 — Level 2 decomposition (Grok per branch):
    For each Level 1 sub-question, decompose into 2 narrower
    sub-questions. Stop here if a branch is already specific enough.

  Phase 3 — Level 3 evidence-gathering (Harper, per leaf):
    Surface ≥ 2 strongest primary sources per Level 3 leaf with
    one-line summaries + URLs.

  Phase 4 — Logic check (Benjamin, per Level 2 synthesis):
    Flag informal fallacies, hidden assumptions, and unsupported jumps.

  Phase 5 — Per-level Lucas veto:
    Lucas reviews the synthesis at each level. If any level is vetoed,
    abort the report — do not paper over a flaw with the next level's
    confidence.

  Phase 6 — Final synthesis (Grok):
    Compose a multi-section research report (≈ 1200 words) with
    citations, logical-structure annotations, and Lucas's approval log
    appended. Tone: rigorous, specific, no hype.

orchestra:
  mode: simulated
  debate_rounds: 1
  include_verbose_streaming: true
  orchestration:
    pattern: hierarchical
    config:
      max_depth: 3
      coordinator: Grok
  agents:
    - {name: Grok,     role: coordinator}
    - {name: Harper,   role: researcher}
    - {name: Benjamin, role: logician}
    - {name: Lucas,    role: contrarian}
  tool_routing:
    Grok:     []
    Harper:   [web_search, x_search]
    Benjamin: [code_execution]
    Lucas:    []

safety:
  lucas_veto_enabled: true
  confidence_threshold: 0.85
  max_veto_retries: 1

deploy:
  target: stdout
  post_to_x: false
