name: combined-trendseeker
goal: "Build a tiny Python module that surfaces today's most-discussed topic on X, debate the result, then post it."

combined: true

build:
  name: trendseeker
  target: python
  entry: trendseeker/__init__.py
  files:
    - path: trendseeker/__init__.py
      template: |
        """Surface today's most-discussed topic on X."""

        def top_topic() -> str:
            """Return the topic title with the highest engagement today."""
            return "<filled in by Bridge>"
    - path: trendseeker/cli.py
      template: |
        from . import top_topic

        def main() -> None:
            print(top_topic())

        if __name__ == "__main__":
            main()
  required_tools: [web_search, x_search]

orchestra:
  mode: simulated
  debate_rounds: 1
  debate_style: prompt-simulated
  include_verbose_streaming: true
  orchestration:
    pattern: native  # transport-native; mode=simulated routes to the named-role runtime
  agents:
    - {name: Grok, role: coordinator}
    - {name: Harper, role: researcher}
    - {name: Benjamin, role: logician}
    - {name: Lucas, role: contrarian}

safety:
  lucas_veto_enabled: true
  confidence_threshold: 0.75
  max_veto_retries: 0  # the combined runtime applies its own final veto pass

deploy:
  target: stdout
  post_to_x: false
