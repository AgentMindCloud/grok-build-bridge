name: debate-loop-hello
goal: "Iterate a multilingual hello with mid-loop Lucas veto + early-consensus exit."

orchestra:
  mode: simulated
  debate_rounds: 1
  debate_style: prompt-simulated
  include_verbose_streaming: true
  orchestration:
    pattern: debate-loop
    config:
      iterations: 2

safety:
  lucas_veto_enabled: true
  confidence_threshold: 0.75
  max_veto_retries: 0

deploy:
  target: stdout
  post_to_x: false
