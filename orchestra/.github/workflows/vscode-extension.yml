# -----------------------------------------------------------------------------
# VS Code extension CI — lint + typecheck + esbuild bundle + vsix package on
# every PR / main push that touches `extensions/vscode/`.
#
# Marketplace publishing is intentionally disabled until a v1.x release. The
# `vscode-v*` tag trigger and the `Publish to VS Code Marketplace` step are
# commented out below; re-enable both (and provision the VSCE_PAT secret)
# the day the extension goes public.
# -----------------------------------------------------------------------------

name: vscode-extension

on:
  push:
    branches: [main]
    # tags: ["vscode-v*"]   # disabled — Marketplace publish reactivates with v1.x.
    paths:
      - "extensions/vscode/**"
      - ".github/workflows/vscode-extension.yml"
  pull_request:
    branches: [main]
    paths:
      - "extensions/vscode/**"
      - ".github/workflows/vscode-extension.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vscode-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: extensions/vscode
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Bundle (esbuild)
        run: npm run package

      - name: Package vsix (no publish)
        run: npm run vsce:package

      - name: Upload .vsix as artefact
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: agent-orchestra.vsix
          path: extensions/vscode/agent-orchestra.vsix

      # Marketplace publish — intentionally disabled until v1.x. Re-enable
      # this step (and the `vscode-v*` tag trigger above) the day the
      # extension goes public, after provisioning the VSCE_PAT secret.
      #
      # - name: Publish to VS Code Marketplace
      #   if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/vscode-v')
      #   env:
      #     VSCE_PAT: ${{ secrets.VSCE_PAT }}
      #   run: npm run vsce:publish -- -p "$VSCE_PAT"
