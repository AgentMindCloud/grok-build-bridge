# -----------------------------------------------------------------------------
# Frontend CI — lint, typecheck, test, build on every PR + main push.
#
# Runs only when files under `frontend/` change so the matrix stays
# fast for backend-only PRs. The build step is non-publishing — just
# proves the static export compiles.
# -----------------------------------------------------------------------------

name: frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build (Node mode)
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: ""
        run: pnpm build

      - name: Build (static export)
        env:
          NEXT_BUILD_TARGET: export
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: ""
        run: pnpm build
