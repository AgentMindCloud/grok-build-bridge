name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Every job that imports `grok_orchestra` relies on `grok_build_bridge`
# being importable. Until Bridge publishes to PyPI we do NOT let pip
# pull the dep from there — install Orchestra with `--no-deps`, add the
# explicit runtime deps, and let `tests/conftest.py` inject the Bridge
# shim at test time. Non-test jobs avoid importing `grok_orchestra`
# directly (see schema-check below).

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Install Orchestra (--no-deps) + explicit runtime + dev deps
        # Version specs are quoted so bash does not interpret `>=` as a
        # redirection operator — important for multi-token install lines.
        run: |
          python -m pip install --upgrade pip
          pip install "xai-sdk>=1.0" "pyyaml>=6" "rich>=13" "typer>=0.12" "tenacity>=8.2" "jsonschema>=4.21"
          pip install --no-deps -e .
          pip install ruff mypy
      - name: Ruff
        run: ruff check .
      - name: Mypy (non-blocking during pre-1.0)
        run: mypy grok_orchestra
        continue-on-error: true

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Orchestra (--no-deps) + explicit runtime + test deps
        run: |
          python -m pip install --upgrade pip
          # Bridge stub first — `tests/conftest.py`'s in-memory shim only
          # covers in-process imports; subprocess tests (test_cli_smoke)
          # boot a fresh interpreter that needs a real install on
          # ``site-packages``. Drop this line the day Bridge ships on
          # PyPI and add ``grok-build-bridge`` to the runtime install.
          pip install ./tools/bridge-stub
          pip install "xai-sdk>=1.0" "pyyaml>=6" "rich>=13" "typer>=0.12" "tenacity>=8.2" "jsonschema>=4.21"
          pip install --no-deps -e .
          # Web tests (test_web_*, test_websocket) need FastAPI's TestClient
          # + httpx + jinja2 (template rendering) + websockets + python-multipart
          # (FastAPI form data). The search-layer fetcher tests need
          # selectolax + trafilatura. Without these they auto-skip and
          # `grok_orchestra.web.*` never imports.
          pip install pytest pytest-asyncio pytest-cov
          pip install "fastapi>=0.110,<1.0" "httpx>=0.27,<1.0" "jinja2>=3,<4" "websockets>=12,<14" "python-multipart>=0.0.9" "selectolax>=0.3,<1" "trafilatura>=1.8,<2"
      - name: Pytest (with coverage)
        # Use `python -m pytest` so it always runs in the same interpreter
        # the runtime deps were installed into, regardless of any other
        # `pytest` shim on PATH.
        #
        # Gate is 80% — `cli.py` and the optional-extras-only modules
        # (langfuse/otel/docx/mcp; the latter four are now omitted in
        # `[tool.coverage.run]`) still hold the headline figure short
        # of the previous 85% target. Bump back to 85 once cli.py grows
        # a unit-level harness and the extras get their own job.
        run: python -m pytest --cov=grok_orchestra --cov-report=term-missing --cov-fail-under=80 -q

  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Install only the bits schema-check needs (no Bridge)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema
      - name: Runtime schema is valid JSON Schema (Draft 2020-12)
        run: |
          python - <<'PY'
          import json
          from jsonschema import Draft202012Validator
          path = "grok_orchestra/schema/orchestra.schema.json"
          with open(path, encoding="utf-8") as fh:
              schema = json.load(fh)
          Draft202012Validator.check_schema(schema)
          print(f"{path}: Draft 2020-12 OK")
          PY
      - name: VS Code schema is valid JSON Schema (Draft-07)
        run: |
          python - <<'PY'
          import json
          from jsonschema import Draft7Validator
          path = "vscode/schemas/orchestra.schema.json"
          with open(path, encoding="utf-8") as fh:
              schema = json.load(fh)
          Draft7Validator.check_schema(schema)
          print(f"{path}: Draft-07 OK")
          PY
      - name: Every bundled template validates against the runtime schema
        # Uses pure jsonschema + yaml, no grok_orchestra import — so
        # we do not need Bridge installed to run schema validation.
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml
          from jsonschema import Draft202012Validator

          with open("grok_orchestra/schema/orchestra.schema.json", encoding="utf-8") as fh:
              schema = json.load(fh)
          validator = Draft202012Validator(schema)

          failed = []
          for path in sorted(Path("grok_orchestra/templates").glob("*.yaml")):
              if path.stem.upper() == "INDEX":
                  continue
              with open(path, encoding="utf-8") as fh:
                  data = yaml.safe_load(fh)
              errors = sorted(validator.iter_errors(data), key=lambda e: list(e.absolute_path))
              if errors:
                  failed.append((path, errors[0]))
                  print(f"FAIL {path}: {errors[0].message}")
              else:
                  print(f"OK  {path}")
          if failed:
              raise SystemExit(1)
          PY

  version-check:
    # Catches the same drift that put `frontend/package.json` on
    # `1.0.0` while every other version marker was on `0.1.0`. All four
    # surfaces ship together; their version strings must match.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: All four version markers in lockstep
        run: |
          PY=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT=$(python -c "import re; print(re.search(r'__version__ = \"([^\"]+)\"', open('grok_orchestra/__init__.py').read()).group(1))")
          FE=$(python -c "import json; print(json.load(open('frontend/package.json'))['version'])")
          VS=$(python -c "import json; print(json.load(open('extensions/vscode/package.json'))['version'])")
          echo "pyproject=$PY  __init__=$INIT  frontend=$FE  vscode=$VS"
          if [ "$PY" != "$INIT" ] || [ "$PY" != "$FE" ] || [ "$PY" != "$VS" ]; then
            echo "::error::Version drift detected. All four files must declare the same version."
            exit 1
          fi

  safety-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Install safety scanner
        run: pip install pip-audit
      - name: pip-audit — fail on known vulnerabilities in runtime deps
        # `grok-build-bridge` is not on PyPI yet; pip-audit can't resolve
        # it and bails before scanning the rest. Filter it out — an
        # unpublished package by definition has no advisory database
        # entry. Re-include the line once Bridge ships on PyPI and
        # delete the comment + grep below.
        run: |
          grep -v '^grok-build-bridge' requirements.txt > /tmp/req-public.txt
          pip-audit --requirement /tmp/req-public.txt --strict

  build:
    needs: [lint, test, schema-check, version-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build wheel + sdist
        # setuptools does not import the package during build; it only
        # reads pyproject.toml + the source tree, so we do not need
        # Bridge installed here.
        run: python -m build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

# Publishing to PyPI lives in .github/workflows/publish.yml — that workflow
# triggers on `v*.*.*` tag pushes and uses OIDC trusted publishing. Keeping
# the release path out of `ci.yml` avoids accidentally double-publishing
# from a CI run that happens to coincide with a tag.
