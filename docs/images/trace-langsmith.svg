<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 700" role="img" aria-labelledby="title desc">
  <title id="title">Agent Orchestra trace tree — span hierarchy</title>
  <desc id="desc">Branded illustration (not a screenshot). Mockup of a tracing-backend span tree showing the run as the root, four role_turn children, llm_call and tool_call grandchildren, with elapsed-time bars on the right.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="700" fill="url(#bg)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1280" height="48" fill="#1c1c1c" stroke="#262626" stroke-width="1"/>
  <text x="20" y="32" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#ff6b35">Trace · run-id 9f1b3c</text>
  <text x="220" y="32" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#888888">backend: langsmith · 318 spans · 47.3 s</text>

  <!-- Column headers -->
  <text x="40" y="80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#888888">SPAN</text>
  <text x="780" y="80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#888888">DURATION</text>
  <text x="1140" y="80" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#888888">TOKENS</text>

  <!-- Span rows -->
  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="13" fill="#ffffff">
    <!-- root run -->
    <text x="40" y="116">▾ run · policy-brief-fast</text>
    <rect x="780" y="104" width="340" height="14" rx="3" fill="#ff6b35"/>
    <text x="1140" y="116" fill="#cccccc">34,520</text>

    <!-- role_turn: grok -->
    <text x="64" y="148" fill="#ff6b35">▾ role_turn · grok (planner)</text>
    <rect x="780" y="136" width="56" height="14" rx="3" fill="#ff6b35"/>
    <text x="1140" y="148" fill="#cccccc">1,420</text>

    <text x="88" y="174" fill="#cccccc">  llm_call · grok-4.20-multi-agent-0309</text>
    <rect x="780" y="162" width="48" height="12" rx="3" fill="#ff6b35" fill-opacity="0.6"/>
    <text x="1140" y="174" fill="#888888">1,420</text>

    <!-- role_turn: harper -->
    <text x="64" y="206" fill="#5fb3d4">▾ role_turn · harper (researcher)</text>
    <rect x="780" y="194" width="180" height="14" rx="3" fill="#5fb3d4"/>
    <text x="1140" y="206" fill="#cccccc">8,050</text>

    <text x="88" y="232" fill="#cccccc">  tool_call · tavily_search × 14</text>
    <rect x="780" y="220" width="120" height="12" rx="3" fill="#5fb3d4" fill-opacity="0.6"/>
    <text x="1140" y="232" fill="#888888">— </text>

    <text x="88" y="258" fill="#cccccc">  tool_call · trafilatura_extract × 11</text>
    <rect x="780" y="246" width="60" height="12" rx="3" fill="#5fb3d4" fill-opacity="0.6"/>
    <text x="1140" y="258" fill="#888888">— </text>

    <text x="88" y="284" fill="#cccccc">  llm_call · grok-4.20-fast (synth)</text>
    <rect x="780" y="272" width="40" height="12" rx="3" fill="#5fb3d4" fill-opacity="0.6"/>
    <text x="1140" y="284" fill="#888888">8,050</text>

    <!-- role_turn: benjamin -->
    <text x="64" y="316" fill="#d3a04a">▾ role_turn · benjamin (synthesiser)</text>
    <rect x="780" y="304" width="92" height="14" rx="3" fill="#d3a04a"/>
    <text x="1140" y="316" fill="#cccccc">5,272</text>

    <text x="88" y="342" fill="#cccccc">  llm_call · grok-4.20-fast</text>
    <rect x="780" y="330" width="84" height="12" rx="3" fill="#d3a04a" fill-opacity="0.6"/>
    <text x="1140" y="342" fill="#888888">4,012</text>

    <text x="88" y="368" fill="#cccccc">  llm_call · grok-4.20-fast (revision)</text>
    <rect x="780" y="356" width="22" height="12" rx="3" fill="#d3a04a" fill-opacity="0.6"/>
    <text x="1140" y="368" fill="#888888">1,260</text>

    <!-- role_turn: lucas -->
    <text x="64" y="400" fill="#e85a5a">▾ role_turn · lucas (safety veto)</text>
    <rect x="780" y="388" width="44" height="14" rx="3" fill="#e85a5a"/>
    <text x="1140" y="400" fill="#cccccc">3,180</text>

    <text x="88" y="426" fill="#cccccc">  llm_call · grok-4.20-0309 (strict-json)</text>
    <rect x="780" y="414" width="40" height="12" rx="3" fill="#e85a5a" fill-opacity="0.6"/>
    <text x="1140" y="426" fill="#888888">3,180</text>

    <text x="88" y="452" fill="#cccccc">  veto_decision · approve · 0.91</text>
    <rect x="780" y="440" width="6" height="12" rx="3" fill="#28c840"/>
    <text x="1140" y="452" fill="#888888">— </text>

    <!-- root tail -->
    <text x="64" y="492" fill="#cccccc">  publish · report.md (3.4 kB)</text>
    <rect x="780" y="480" width="14" height="12" rx="3" fill="#888888"/>
    <text x="1140" y="492" fill="#888888">— </text>

    <text x="64" y="518" fill="#cccccc">  emit · orchestra-events.jsonl</text>
    <rect x="780" y="506" width="6" height="12" rx="3" fill="#888888"/>
    <text x="1140" y="518" fill="#888888">— </text>
  </g>

  <!-- Footer legend -->
  <g font-family="Inter, system-ui, sans-serif" font-size="11" fill="#888888">
    <text x="40" y="600">Compatible backends: LangSmith · Langfuse (manual install) · OTLP via OTEL_EXPORTER_OTLP_ENDPOINT</text>
    <text x="40" y="624">Tracer is opt-in: set the relevant env var, otherwise NoOpTracer (zero overhead).</text>
  </g>
</svg>
