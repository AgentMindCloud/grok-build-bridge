# -----------------------------------------------------------------------------
# grok-agent-orchestra — single-service compose stack.
#
# Quickstart:
#   cp .env.example .env
#   $EDITOR .env                       # paste XAI_API_KEY etc.
#   docker compose up --build
#   open http://localhost:8000
#
# Hot-reload during development:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Production-ish run (no hot-reload, image rebuilt on `up --build`):
#   docker compose up -d --build
# -----------------------------------------------------------------------------

services:
  orchestra:
    build:
      context: .
      dockerfile: Dockerfile
    image: grok-agent-orchestra:0.1.0
    container_name: grok-agent-orchestra
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      # Non-secret defaults. Override via .env.
      ORCHESTRA_MODE: ${ORCHESTRA_MODE:-auto}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      # Persisted workspace for user docs (debate-loop-with-local-docs etc.)
      # and any future export targets. Created if missing.
      - ./workspace:/app/workspace
    restart: unless-stopped
    # Same healthcheck as the Dockerfile; here for compose-aware schedulers
    # like Portainer / Watchtower.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request, sys
          sys.exit(0) if urllib.request.urlopen("http://127.0.0.1:8000/api/health", timeout=3).status == 200 else sys.exit(1)
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Optional Next.js frontend — not started by default. Use the dev
  # overlay (`docker-compose.dev.yml`) to spin it up alongside the
  # backend on port 3000. In production, the static export is baked
  # into the orchestra image so this service is unnecessary.
  frontend:
    profiles: ["dev-ui"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: grok-agent-orchestra-frontend:0.1.0
    container_name: grok-agent-orchestra-frontend
    depends_on:
      - orchestra
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  frontend_node_modules:
