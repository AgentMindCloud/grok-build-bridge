# grok-build-bridge — local dev / preview compose stack
#
# Quick start:
#   cp .env.example .env          # then fill in XAI_API_KEY + X_BEARER_TOKEN
#   docker compose up             # builds the image and runs the default command
#   docker compose run --rm grok-build-bridge run examples/hello.yaml
#   docker compose run --rm grok-build-bridge templates
#
# The source is bind-mounted, so editable-install picks up local edits live —
# no rebuild needed for code changes (only for dependency changes).

services:
  grok-build-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    image: grok-build-bridge:dev
    container_name: grok-build-bridge

    # Default `up` behaviour: print the banner + help and exit cleanly.
    # Real usage goes through `docker compose run` — see header comment.
    command: ["--help"]

    # Pulls XAI_API_KEY / X_BEARER_TOKEN / GROK_INSTALL_HOME from .env.
    # File is optional at compose-parse time; create it from .env.example.
    env_file:
      - .env

    environment:
      # Surface CLI logs immediately rather than buffering until exit.
      PYTHONUNBUFFERED: "1"

    # Reserved for the upcoming Typer-based status UI (roadmap Phase 4).
    ports:
      - "8000:8000"

    volumes:
      # Bind-mount the package + tests + examples so editable mode picks
      # up host edits without rebuilding the image. Schema, templates,
      # and snippets live inside grok_build_bridge/ and come along for free.
      - ./grok_build_bridge:/app/grok_build_bridge
      - ./tests:/app/tests
      - ./examples:/app/examples

    # Mirrors the Dockerfile HEALTHCHECK so `docker compose ps` reports
    # status for long-running invocations (e.g. when the UI service lands).
    healthcheck:
      test: ["CMD", "grok-build-bridge", "version"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

    # Don't auto-restart on `--help` exit; flip to `unless-stopped` once
    # the service has a long-running default command (UI / scheduler).
    restart: "no"
